<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春日花朵 - 作品集</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="../../index.html" style="color: white; text-decoration: none;">作品集</a></h1>
            <p class="subtitle">艺术创作展示</p>
        </div>
    </header>

    <main class="container">
        <nav class="work-navigation">
            <div class="work-navigation-left">
                <a href="../../index.html" class="button return-button">返回作品列表</a>
                <span class="work-navigation-title">作品详情</span>
            </div>
        </nav>

        <article class="work-detail">
            <header>
                <h1 data-field="title"></h1>
            </header>

            <section class="work-media">
                <div class="work-image-container">
                    <img src="images/main.jpg"
                         alt="春日花朵铅笔素描作品"
                         class="work-image"
                         id="main-work-image"
                         data-field="mainImage">
                </div>
                <div class="audio-player">
                    <h3>作品说明</h3>
                    <audio controls autoplay>
                        <source src="audio/guihua.m4a" type="audio/mp4">
                        您的浏览器不支持音频播放。
                    </audio>
                    <div class="audio-transcript" style="margin-top: 1rem;">
                        <!-- <details> -->
                            <!-- <summary>查看音频文字转录</summary> -->
                            <p style="margin-top: 0.5rem;">桂花是秋天的“香香树”！它喜欢晒太阳，叶子硬硬的。一到秋天，就会开出很多金黄色的小花，一簇簇开在叶子旁边，闻起来很香甜。人们喜欢用它来做桂花糕和香香的桂花茶哦！</p>
                        <!-- </details> -->
                    </div>
                </div>
            </section>

            <section class="work-info">
                <div class="work-meta">
                    <h3>作品信息</h3>
                    <p><strong>作者：</strong><span data-field="arauthor">于千浔</span></p>
                    <p><strong>创作日期：</strong><span data-field="createdAt">2026-02-10</span></p>
                </div>

                <div class="work-description">
                    <h3>作品描述</h3>
                    <p data-field="description">铅笔素描作品，描绘春天盛开的花朵。仔细观察了花瓣的形态和纹理，尝试表现花朵的生命力。</p>
                </div>
            </section>
        </article>
    </main>

    <footer>
        <div class="container">
            <p>© <span id="current-year"></span> 艺术创作作品集</p>
            <p>作品ID：<span data-field="id">flower-drawing</span> | 最后更新：<span data-field="updatedAt">2024-02-15</span></p>
        </div>
    </footer>

    <script src="../../scripts/particles.js"></script>
    <script src="../../scripts/work-loader.js"></script>
    <script>
        // 设置当前年份
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // 可访问性增强
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                document.body.classList.add('keyboard-navigation');
            }
        });

        document.addEventListener('mousedown', function() {
            document.body.classList.remove('keyboard-navigation');
        });

        // 音频自动播放功能（带重试机制）
        const audioElement = document.querySelector('audio');
        if (audioElement) {
            // 检测是否在微信浏览器中
            const isWeChatBrowser = /MicroMessenger/i.test(navigator.userAgent);

            if (isWeChatBrowser) {
                // 微信浏览器环境：使用微信特定的音频播放策略
                console.log('检测到微信浏览器，启用微信特定音频播放策略');

                // 微信JS-SDK准备就绪事件
                document.addEventListener('WeixinJSBridgeReady', function() {
                    console.log('WeixinJSBridgeReady，尝试播放音频');
                    tryAutoPlayWithRetry(audioElement, 3, 0);
                }, false);

                // 同时仍然执行常规的延迟播放（作为后备）
                setTimeout(() => {
                    tryAutoPlayWithRetry(audioElement, 3, 0);
                }, 1000); // 1秒延迟
            } else {
                // 非微信浏览器：使用常规延迟播放
                setTimeout(() => {
                    tryAutoPlayWithRetry(audioElement, 3, 0);
                }, 1000); // 1秒延迟
            }
        }

        // 带重试和用户交互支持的自动播放函数
        function tryAutoPlayWithRetry(audioElement, maxRetries = 3, retryCount = 0) {
            console.log(`尝试自动播放音频 (重试次数: ${retryCount}/${maxRetries})`);

            const playPromise = audioElement.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log('音频自动播放成功');
                }).catch(error => {
                    // 自动播放被阻止
                    console.log('自动播放被阻止:', error.name, error.message);

                    // 检查是否是自动播放被阻止的错误
                    const isAutoplayError = error.name.includes('NotAllowedError') ||
                                          error.name.includes('NotSupportedError') ||
                                          error.message.includes('user gesture') ||
                                          error.message.includes('autoplay');

                    if (isAutoplayError && retryCount < maxRetries) {
                        // 计算重试延迟（递增：2秒, 5秒, 8秒）
                        const retryDelay = 2000 + (retryCount * 3000); // 2秒, 5秒, 8秒
                        console.log(`将在 ${retryDelay/1000} 秒后重试，或点击页面立即重试`);

                        // 设置超时重试
                        const retryTimer = setTimeout(() => {
                            tryAutoPlayWithRetry(audioElement, maxRetries, retryCount + 1);
                        }, retryDelay);

                        // 添加用户交互监听器（点击页面立即重试）
                        const handleUserInteraction = () => {
                            console.log('检测到用户交互，立即重试音频播放');
                            clearTimeout(retryTimer); // 取消超时重试
                            document.removeEventListener('click', handleUserInteraction);
                            document.removeEventListener('touchstart', handleUserInteraction);
                            tryAutoPlayWithRetry(audioElement, maxRetries, retryCount + 1);
                        };

                        // 监听点击和触摸事件
                        document.addEventListener('click', handleUserInteraction, { once: true });
                        document.addEventListener('touchstart', handleUserInteraction, { once: true });
                    } else {
                        // 重试次数用尽或不是自动播放错误，显示提示
                        console.log('自动播放重试失败，显示用户提示');
                        showAutoPlayPrompt(audioElement);
                    }
                });
            }
        }

        // 显示自动播放提示
        function showAutoPlayPrompt(audioElement) {
            // 创建提示元素
            const prompt = document.createElement('div');
            prompt.className = 'autoplay-prompt';
            prompt.innerHTML = `
                <p>音频已准备就绪，点击按钮播放</p>
                <button class="play-button">播放音频</button>
            `;

            // 添加到音频播放器区域
            const audioPlayer = document.querySelector('.audio-player');
            if (audioPlayer) {
                audioPlayer.appendChild(prompt);

                // 添加播放按钮事件
                const playButton = prompt.querySelector('.play-button');
                playButton.addEventListener('click', function() {
                    audioElement.play().catch(e => console.log('播放失败:', e));
                    prompt.remove();
                });
            }
        }
    </script>
</body>
</html>
