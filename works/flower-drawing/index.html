<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春日花朵 - 作品集</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="../../index.html" style="color: white; text-decoration: none;">作品集</a></h1>
            <p class="subtitle">艺术创作展示</p>
        </div>
    </header>

    <main class="container">
        <nav class="work-navigation">
            <div class="work-navigation-left">
                <a href="../../index.html" class="button return-button">返回作品列表</a>
                <span class="work-navigation-title">作品详情</span>
            </div>
        </nav>

        <article class="work-detail">
            <header>
                <h1 data-field="title"></h1>
            </header>

            <section class="work-media">
                <div class="work-image-container">
                    <img src="images/main.jpg"
                         alt="春日花朵铅笔素描作品"
                         class="work-image"
                         id="main-work-image"
                         data-field="mainImage">
                </div>
                <div class="audio-player">
                    <h3>作品说明</h3>
                    <audio controls autoplay>
                        <source src="audio/guihua.m4a" type="audio/mp4">
                        您的浏览器不支持音频播放。
                    </audio>
                    <div class="audio-transcript" style="margin-top: 1rem;">
                        <!-- <details> -->
                            <!-- <summary>查看音频文字转录</summary> -->
                            <p style="margin-top: 0.5rem;">桂花是秋天的“香香树”！它喜欢晒太阳，叶子硬硬的。一到秋天，就会开出很多金黄色的小花，一簇簇开在叶子旁边，闻起来很香甜。人们喜欢用它来做桂花糕和香香的桂花茶哦！</p>
                        <!-- </details> -->
                    </div>
                </div>
            </section>

            <section class="work-info">
                <div class="work-meta">
                    <h3>作品信息</h3>
                    <p><strong>作者：</strong><span data-field="arauthor">于千浔</span></p>
                    <p><strong>创作日期：</strong><span data-field="createdAt">2026-02-10</span></p>
                </div>

                <div class="work-description">
                    <h3>作品描述</h3>
                    <p data-field="description">铅笔素描作品，描绘春天盛开的花朵。仔细观察了花瓣的形态和纹理，尝试表现花朵的生命力。</p>
                </div>
            </section>
        </article>
    </main>

    <footer>
        <div class="container">
            <p>© <span id="current-year"></span> 艺术创作作品集</p>
            <p>作品ID：<span data-field="id">flower-drawing</span> | 最后更新：<span data-field="updatedAt">2024-02-15</span></p>
        </div>
    </footer>

    <script src="../../scripts/particles.js"></script>
    <script src="../../scripts/work-loader.js"></script>
    <script>
        // 设置当前年份
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // 可访问性增强
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                document.body.classList.add('keyboard-navigation');
            }
        });

        document.addEventListener('mousedown', function() {
            document.body.classList.remove('keyboard-navigation');
        });
    </script>
</body>
</html>
